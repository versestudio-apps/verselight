name: verselight
description: VerseLight — daily Bible devotional (Android MVP skeleton)
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  firebase_core: ^4.9.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#FAF7F0"
  adaptive_icon_foreground: assets/branding/app_icon.png

flutter:
  uses-material-design: true
  assets:
    # AI-generated, app-owned devotional artwork (see
    # docs/visual-direction-catholic.md). Missing files fall back to a
    # gradient placeholder via DevotionalImage, so the app keeps building
    # even before every PNG ships.
    - assets/images/devotional/
